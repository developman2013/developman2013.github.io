<section class="section github-section" id="github">
  <div class="section-head">
    <h2>{{ title }}</h2>
    <p>{{ lead }}</p>
  </div>
  <a
    class="github-card-link"
    [href]="profileUrl"
    target="_blank"
    rel="noopener noreferrer"
    referrerpolicy="no-referrer"
    [attr.aria-label]="openProfileLabel"
    (click)="onOpenProfileClick()"
  >
    <img
      class="github-card-image"
      [src]="summaryUrl"
      alt="GitHub profile details for developman2013"
      loading="lazy"
      decoding="async"
      referrerpolicy="no-referrer"
    />
  </a>
</section>
